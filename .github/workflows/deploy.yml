name: Build and Deploy
on:
  push:
    branches: [ main ]
  workflow_dispatch: # 允许手动触发
jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
    - uses: actions/setup-node@v6
      with:
        node-version: '24'
    - run: npm install
    - name: Cache Godot Web toolchain
      uses: actions/cache@v6
      with:
        path: |
          ${{ runner.temp }}/godot-4.7.1/godot
          ~/.local/share/godot/export_templates/4.7.1.stable/web_nothreads_release.zip
        key: godot-web-4.7.1-linux-x86_64-v1
    - name: Install Godot Web toolchain
      run: bash scripts/install-godot-web-ci.sh
    - name: Export Godot homepage runtime
      env:
        GODOT_BIN: ${{ runner.temp }}/godot-4.7.1/godot
      run: npm run godot:export
    - run: npm run build
    - name: Upload artifact
      uses: actions/upload-pages-artifact@v5
      with:
        path: ./dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build-and-deploy
    if: success()
    permissions:
      pages: write
      id-token: write
    steps:
    - name: Deploy to GitHub Pages
      id: deployment
      uses: actions/deploy-pages@v5
