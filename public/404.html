<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="dark light" />
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <title>页面未找到 · Qingyu Ge</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #0b0f18;
        --surface: #111722;
        --ink: #edf1f7;
        --muted: #a9b4c7;
        --line: #2c3545;
        --accent: #ffb86b;
        --accent-ink: #0a0e1a;
      }

      @media (prefers-color-scheme: light) {
        :root {
          color-scheme: light;
          --bg: #f4f6fa;
          --surface: #ffffff;
          --ink: #172033;
          --muted: #4f5c74;
          --line: #d9dfe9;
          --accent: #c45d00;
          --accent-ink: #ffffff;
        }
      }

      * { box-sizing: border-box; }

      body {
        display: grid;
        min-height: 100vh;
        min-height: 100svh;
        margin: 0;
        padding: 1.5rem;
        place-items: center;
        background: var(--bg);
        color: var(--ink);
        font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
      }

      main {
        width: min(100%, 680px);
        padding: clamp(1.5rem, 5vw, 3rem) 0;
        border-top: 1px solid var(--line);
        border-bottom: 1px solid var(--line);
      }

      .status {
        margin: 0 0 1.25rem;
        color: var(--accent);
        font-size: 0.75rem;
        letter-spacing: 0.08em;
      }

      h1 {
        margin: 0 0 1rem;
        font-family: ui-serif, Georgia, serif;
        font-size: clamp(2.4rem, 8vw, 5rem);
        font-weight: 600;
        letter-spacing: -0.035em;
        line-height: 1.05;
        text-wrap: balance;
      }

      .description {
        max-width: 52ch;
        margin: 0 0 2rem;
        color: var(--muted);
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        font-size: 1rem;
        line-height: 1.75;
      }

      nav { display: flex; flex-wrap: wrap; gap: 0.75rem; }

      a {
        display: inline-flex;
        min-height: 44px;
        align-items: center;
        justify-content: center;
        padding: 0.7rem 1rem;
        border: 1px solid var(--line);
        border-radius: 8px;
        color: var(--ink);
        text-decoration: none;
        transition: border-color 180ms cubic-bezier(0.22, 1, 0.36, 1), color 180ms cubic-bezier(0.22, 1, 0.36, 1);
      }

      a:first-child {
        border-color: var(--accent);
        background: var(--accent);
        color: var(--accent-ink);
      }

      a:hover { border-color: var(--accent); color: var(--accent); }
      a:first-child:hover { color: var(--accent-ink); }
      a:focus-visible { outline: 2px solid var(--accent); outline-offset: 3px; }

      @media (prefers-reduced-motion: reduce) {
        a { transition: none; }
      }
    </style>
  </head>
  <body>
    <main>
      <p class="status">ERROR 404 · ROUTE NOT FOUND</p>
      <h1>这条路径没有对应的档案。</h1>
      <p class="description">
        链接可能已经移动，或者地址输入有误。你可以返回主页继续查看项目、文章和工程历程。
      </p>
      <nav aria-label="错误页面导航">
        <a href="/">返回首页</a>
        <a href="/#/projects">查看项目</a>
      </nav>
    </main>
  </body>
</html>
